<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#23201c; --ink-soft:#5d564d;
    --paper:#f5f4ef; --card:#fffdf9;
    --line:#ddd6cb; --gold:#a8813c; --ai:#33415e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--paper); color:var(--ink); font-family:"Zen Kaku Gothic New",sans-serif; line-height:1.8; -webkit-font-smoothing:antialiased; padding:40px 16px 60px; }
  .lib { max-width:520px; margin:0 auto; }
  header { text-align:center; padding-bottom:26px; }
  header .en { font-family:"Shippori Mincho",serif; font-size:10px; letter-spacing:.36em; color:var(--gold); }
  h1 { font-family:"Shippori Mincho",serif; font-size:28px; font-weight:600; letter-spacing:.3em; margin-top:6px; }
  header .sub { font-size:12px; color:var(--ink-soft); letter-spacing:.12em; margin-top:6px; }
  .shelf { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  a.tome { text-decoration:none; color:var(--ink); background:var(--card); border:1px solid var(--line); box-shadow:0 2px 16px rgba(35,32,28,.06); display:block; overflow:hidden; transition:transform .15s; }
  a.tome:active { transform:scale(.98); }
  .tome .cover { aspect-ratio:1; }
  .tome .cover img { width:100%; height:100%; object-fit:cover; display:block; }
  .tome .label { padding:10px 12px 12px; }
  .tome .label b { font-family:"Shippori Mincho",serif; font-size:15px; font-weight:600; letter-spacing:.14em; display:block; }
  .tome .label small { font-size:11px; color:var(--ink-soft); letter-spacing:.04em; }
  .tome.empty { border:1px dashed var(--line); background:none; box-shadow:none; display:flex; align-items:center; justify-content:center; aspect-ratio:1/1.32; }
  .tome.empty span { font-family:"Shippori Mincho",serif; font-size:11px; color:#c4bdb1; letter-spacing:.12em; text-align:center; }
  .backroom { margin-top:40px; padding-top:16px; border-top:1px solid var(--line); text-align:center; }
  .backroom .cap { font-size:10.5px; color:#b3aca0; letter-spacing:.2em; margin-bottom:6px; font-family:"Shippori Mincho",serif; }
  .backroom a { color:var(--ink-soft); font-size:12px; letter-spacing:.08em; text-decoration:none; border-bottom:1px dotted var(--line); padding-bottom:1px; }
  footer { text-align:center; padding-top:30px; font-family:"Shippori Mincho",serif; font-size:10.5px; letter-spacing:.28em; color:var(--ink-soft); }
</style>
